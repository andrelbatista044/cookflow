<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookFlow - Monitor de Pedidos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="monitor-page tv-view">
    <header class="monitor-header">
        <div class="logo">
            <span class="logo-icon">🔥</span>
            <h1>Cook<span>Flow</span></h1>
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main class="monitor-grid">
        <section class="monitor-column prep">
            <div class="monitor-column-title">⏳ PREPARANDO</div>
            <div id="preparing-list" class="monitor-list"></div>
        </section>

        <section class="monitor-column ready">
            <div class="monitor-column-title">✅ PRONTO</div>
            <div id="ready-list" class="monitor-list"></div>
        </section>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        // Relógio para o monitor
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
