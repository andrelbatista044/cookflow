<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookFlow - Painel da Cozinha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="kitchen-page">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>Cook<span>Flow</span></h1>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="cozinha.html">Cozinha</a></li>
                    <li><a href="index.html">Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-info">
                    <h2>Painel da Cozinha</h2>
                    <p>Gerencie os pedidos ativos.</p>
                </div>
                <div id="sync-status" class="status-badge sync">Sincronizado</div>
            </header>

            <div class="dashboard-grid">
                <section class="column" id="pending">
                    <div class="column-header">
                        <h2>Pendentes</h2>
                        <span class="count">0</span>
                    </div>
                    <div class="order-list"></div>
                </section>

                <section class="column" id="preparing">
                    <div class="column-header">
                        <h2>Em Preparo</h2>
                        <span class="count">0</span>
                    </div>
                    <div class="order-list"></div>
                </section>

                <section class="column" id="ready">
                    <div class="column-header">
                        <h2>Prontos</h2>
                        <span class="count">0</span>
                    </div>
                    <div class="order-list"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
