<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookFlow - Admin Center</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-page">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>Cook<span>Flow</span></h1>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="admin.html">Dashboard</a></li>
                    <li><a href="cozinha.html">Cozinha</a></li>
                    <li><a href="caixa.html">Caixa</a></li>
                    <li><a href="#" onclick="signOut()">Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-info">
                    <h2>Admin Center</h2>
                    <p>Gestão completa de usuários e vendas.</p>
                </div>
            </header>

            <!-- Stats -->
            <div class="admin-grid">
                <div class="stat-card"><h3>Pedidos Hoje</h3><p id="stat-total-today">0</p></div>
                <div class="stat-card"><h3>Receita</h3><p id="stat-revenue">R$ 0,00</p></div>
            </div>

            <!-- User Management -->
            <section class="admin-section">
                <h3>Equipe & Permissões</h3>
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Cargo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Recent Orders -->
            <section class="admin-section">
                <h3>Vendas Recentes</h3>
                <div class="table-container">
                    <table id="recent-orders-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Mesa</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        async function initAdmin() {
            // Stats
            const stats = await getDashboardStats();
            document.getElementById('stat-total-today').textContent = stats.totalToday;
            document.getElementById('stat-revenue').textContent = `R$ ${stats.revenue.toFixed(2)}`;

            // Users
            const users = await getAllProfiles();
            const userBody = document.querySelector('#users-table tbody');
            userBody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.full_name || 'Sem nome'}</td>
                    <td>
                        <select onchange="updateUserRole('${u.id}', this.value)" class="role-select">
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                            <option value="caixa" ${u.role === 'caixa' ? 'selected' : ''}>Caixa</option>
                            <option value="cozinha" ${u.role === 'cozinha' ? 'selected' : ''}>Cozinha</option>
                        </select>
                    </td>
                    <td><button class="btn-action small" onclick="alert('Funcionalidade de deletar via Admin API requer Edge Function')">Remover</button></td>
                </tr>
            `).join('');

            // Orders
            const orders = await getOrders();
            const orderBody = document.querySelector('#recent-orders-table tbody');
            orderBody.innerHTML = orders.slice(0, 10).map(o => `
                <tr>
                    <td>${o.number}</td>
                    <td>${o.table_name}</td>
                    <td>R$ ${o.total.toFixed(2)}</td>
                    <td><span class="status-badge ${o.status}">${o.status}</span></td>
                </tr>
            `).join('');
        }

        async function updateUserRole(id, role) {
            await updateProfileRole(id, role);
            alert('Cargo atualizado!');
        }

        document.addEventListener('DOMContentLoaded', initAdmin);
    </script>
</body>
</html>
