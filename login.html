<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookFlow - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <header class="login-header">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>Cook<span>Flow</span></h1>
            </div>
            <p>Acesse o painel administrativo</p>
        </header>

        <form id="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login-email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary btn-large">Entrar</button>
            <p id="login-error" class="error-msg hidden">E-mail ou senha incorretos.</p>
        </form>

        <footer class="login-footer">
            <a href="index.html">← Voltar para o início</a>
        </footer>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        // Lógica local de login para evitar poluir o app.js
        const loginForm = document.getElementById('login-form');
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');

            const { data, error } = await signIn(email, password);

            if (error) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = "Erro: " + error.message;
            } else {
                window.location.href = 'admin.html';
            }
        };
    </script>
</body>
</html>
