<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookFlow - Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="landing-page">
    <script src="supabase.js"></script>
    <script>
        // Redirecionamento Imediato
        async function checkInitialAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            } else {
                // Se já estiver logado, mostra a landing
                document.body.style.display = 'block';
            }
        }
        document.body.style.display = 'none';
        checkInitialAuth();
    </script>

    <div class="landing-container">
        <header class="landing-header">
            <div class="logo large">
                <span class="logo-icon">🔥</span>
                <h1>Cook<span>Flow</span></h1>
            </div>
            <p>Painel de Acesso Rápido</p>
        </header>

        <main class="access-grid">
            <a href="totem.html" class="access-card">
                <div class="card-icon">📱</div>
                <h3>Totem / Pedidos</h3>
                <span class="btn-primary">Entrar</span>
            </a>

            <a href="cozinha.html" class="access-card">
                <div class="card-icon">👨‍🍳</div>
                <h3>Cozinha</h3>
                <span class="btn-primary">Entrar</span>
            </a>

            <a href="caixa.html" class="access-card">
                <div class="card-icon">💰</div>
                <h3>Caixa</h3>
                <span class="btn-primary">Entrar</span>
            </a>

            <a href="monitor.html" class="access-card">
                <div class="card-icon">📺</div>
                <h3>Monitor</h3>
                <span class="btn-primary">Entrar</span>
            </a>
        </main>

        <div class="landing-actions">
            <a href="admin.html" class="btn-secondary">⚙️ Admin Center (Restrito)</a>
            <button onclick="signOut()" class="btn-secondary" style="margin-left: 10px;">Sair</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
